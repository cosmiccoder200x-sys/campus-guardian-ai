<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Campus Guardian</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="csrf-token" content="{{ csrf_token() }}">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#16161f;--border:#2a2a3a;--text:#e8e8f0;--text2:#9090a8;--accent:#7c6bff;--red:#ef4444;--green:#22c55e}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-wrap{width:100%;max-width:400px;padding:24px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#7c6bff,#8b5cf6);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:16px;font-weight:700}
h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;background:#1e1e2a;border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;transition:border-color 0.15s}
.form-input:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:opacity 0.15s}
.btn:hover{opacity:0.9}
.flash{padding:10px 14px;border-radius:8px;font-size:12.5px;margin-bottom:16px}
.flash-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red)}
.footer-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
.footer-link a{color:var(--accent);font-weight:500}
.back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-bottom:16px;text-decoration:none}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="auth-wrap">
  <a href="/" class="back">← Back</a>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">Campus Guardian AI</div>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Log in to your academic dashboard</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="flash flash-{{cat}}">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="••••••••" required>
      </div>
      <button class="btn" type="submit">Log In →</button>
    </form>
    <div class="footer-link">Don't have an account? <a href="/register">Sign Up</a></div>
  </div>
</div>
</body>
</html>
